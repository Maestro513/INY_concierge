services:
  - type: web
    name: iny-concierge
    runtime: python
    buildCommand: pip install -r backend/requirements.txt && cd admin && npm ci && npm run build
    startCommand: cd backend && bash start.sh
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true
      - key: AUDIT_HMAC_KEY
        generateValue: true
    disk:
      name: iny-data
      mountPath: /data
      sizeGB: 1
